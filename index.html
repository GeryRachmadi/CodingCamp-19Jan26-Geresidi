<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List</title>

    <!-- CSS Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Main Content Section -->
    <main class="app-container">
        <!-- Header Section -->
        <header>
            <div class="header-top">
                <div>
                    <!-- App Title -->
                    <h1 class="app-title">To-do List</h1>
                    <!-- Current Date -->
                    <p id="dateDisplay">Loading Date...</p>
                </div>
            </div>

            <!-- Navigation Bar / Control Section -->
            <section class="control-wrapper">
                <!-- Task Status -->
                 <div class="task-status">
                    <button class="status-button active" onclick="filterTasks('all')">All</button>
                    <button class="status-button" onclick="filterTasks('pending')">Pending</button>
                    <button class="status-button" onclick="filterTasks('completed')">Completed</button>
                </div>

                <!-- Filter Task -->
                 <div class="filter-task">
                    <select id="sort-select" onchange="handleSort(this.value)" aria-label="Sort Tasks">
                        <option value="date-asc">Newest</option>
                        <option value="date-desc">Oldest</option>
                        <option value="name-asc">Name A-Z</option>
                        <option value="name-desc">Name Z-A</option>
                    </select>
                </div>
            </section>
        </header>

        <!-- Task List Section -->
        <section class="task-list-container">
            <!-- Empty List/State -->
            <div id="emptyState" class="empty-state">
                <!-- font-awesome-solid font-awesome-clipboard-list -->
                <i class="fas fa-clipboard-list"></i>
                <p>No tasks available. Add a new task to get started!</p>
            </div> 

            <!-- List Elements -->
            <ul id="taskList">
                <!-- JavaScript inject List Item -->
            </ul>
        </section>

        <!-- Floating Action Button New Task Button -->
        <div class="fab-wrapper">
            <button class="fab-button" onclick="openPopup()" aria-label="Add New Task">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- Popup Form Section for Adding New Task Form-->
        <div id="taskPopup" class="popup" role="dialog" aria-modal="true">
            <div class="popup-content">
                <!-- Popup Header -->
                <div class="popup-header">
                    <h3 id="popup-title">Add New Task</h3>
                    <button class="close-button" onclick="closePopup()" aria-label="Close Popup">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <!-- Task Input Form -->
                <form id="taskForm" onsubmit="handleFormSubmit(event)">
                    <!-- (For Edit) Hidden Input Task ID -->
                    <input type="hidden" id="taskId">

                    <!-- Task Name Input Group -->
                    
                </form>
            </div>
        </div>
    </main>
</body>
</html>
