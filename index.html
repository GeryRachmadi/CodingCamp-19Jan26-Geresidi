<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priorify - Simple To-Do List App</title>

    <!-- CSS Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Main Content Section -->
    <main class="app-container">
        <!-- Header Section -->
        <header>
            <div class="header-top">
                <div>
                    <!-- App Title -->
                    <h1 class="app-title">Priorify</h1>
                    <!-- Current Date -->
                    <p id="dateDisplay">Loading Date...</p>
                </div>
            </div>

            <!-- Navigation Bar / Control Section -->
            <section class="control-wrapper">
                <!-- Task Status -->
                 <div class="task-status">
                    <button class="status-button active" onclick="statusTasks('all')" data-filter="all">All</button>
                    <button class="status-button" onclick="statusTasks('active')" data-filter="active">Ongoing</button>
                    <button class="status-button" onclick="statusTasks('completed')" data-filter="completed">Completed</button>
                </div>

                <!-- Filter Task -->
                 <div class="filter-task">
                    <select id="sort-select" onchange="handleSort(this.value)" aria-label="Sort Tasks">
                        <option value="date-asc">Closest Deadline</option>
                        <option value="date-desc">Furthest Deadline</option>
                        <option value="name-asc">Name A-Z</option>
                        <option value="name-desc">Name Z-A</option>
                    </select>
                </div>
            </section>
        </header>

        <!-- Task List Section -->
        <section class="task-list-container">
            <!-- Empty List/State -->
            <div id="emptyState" class="empty-state">
                <!-- font-awesome-solid font-awesome-clipboard-list -->
                <i class="fas fa-clipboard-list"></i>
                <p>No tasks available. Add a new task to get started!</p>
            </div> 

            <!-- List Elements -->
            <ul id="taskList">
                <!-- JavaScript inject List Item -->
            </ul>
        </section>

        <!-- Floating Action Button New Task Button -->
        <div class="fab-wrapper">
            <button class="fab-button" onclick="openPopup()" aria-label="Add New Task">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </main>

    <!-- Modal / Popup Form Section for Adding New Task Form-->
    <div id="taskPopup" class="popup" role="dialog" aria-modal="true">
        <div class="popup-content">
            <!-- Popup Header -->
            <div class="popup-header">
                <h3 id="popupTitle">Add New Task</h3>
                <button class="close-button" onclick="closePopup()" aria-label="Close Popup">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Task Input Form -->
            <form id="taskForm" onsubmit="handleFormSubmit(event)">
                <!-- (For Edit) Hidden Input Task ID -->
                <input type="hidden" id="taskId">

                <!-- Task Name Input Group -->
                <div class="form-group">
                    <label for="taskName">Task Name</label>
                    <input type="text" id="taskName" class="form-control" placeholder="What do you want to accomplish?" required>
                    <!-- Error Message if Task Name is Empty -->
                    <p class="error-message" id="nameError">Task name cannot be empty.</p>
                </div>

                <!-- Task Due Date -->
                <div class="form-group">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate" class="form-control">
                </div>

                <!-- Form Action Buttons -->
                <div class="button-group">
                    <button type="submit" class="button button-save">Add Task</button>
                    <button type="button" class="button button-cancel" onclick="closePopup()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
        <p class="copyright-text">
            2026 Simple Todo App - by gryrchmd
        </p>
    </footer>

    <!-- JavaScript File -->
    <script src="js/script.js"></script>
</body>
</html>
